# Edit tool descriptions below. Run `mcp-anything generate --description` to apply.
tools:
  interactive_init_item:
    description: Init item in the interactive store
    parameters:
      itemId:
        description: itemId (AnyNodeId)
      interactive:
        description: interactive (Interactive)
  interactive_set_control_value:
    description: Set control value in the interactive store
    parameters:
      itemId:
        description: itemId (AnyNodeId)
      index:
        description: index (number)
      value:
        description: value (ControlValue)
  interactive_remove_item:
    description: Remove item in the interactive store
    parameters:
      itemId:
        description: itemId (AnyNodeId)
  scene_load_scene:
    description: Load scene in the scene store
  scene_clear_scene:
    description: Clear scene in the scene store
  scene_unload_scene:
    description: Unload scene in the scene store
  scene_set_scene:
    description: Set scene in the scene store
    parameters:
      nodes:
        description: nodes (Record<AnyNodeId, AnyNode>)
      rootNodeIds:
        description: rootNodeIds (AnyNodeId[])
  scene_create_node:
    description: Create node in the scene store
    parameters:
      node:
        description: node (AnyNode)
      parentId:
        description: parentId (AnyNodeId)
  scene_create_nodes:
    description: Create nodes in the scene store
    parameters:
      ops:
        description: 'ops ({ node: AnyNode; parentId?: AnyNodeId }[])'
  scene_update_node:
    description: Update node in the scene store
    parameters:
      id:
        description: id (AnyNodeId)
      data:
        description: data (Partial<AnyNode>)
  scene_update_nodes:
    description: Update nodes in the scene store
    parameters:
      updates:
        description: 'updates ({ id: AnyNodeId; data: Partial<AnyNode> }[])'
  scene_delete_node:
    description: Delete node in the scene store
    parameters:
      id:
        description: id (AnyNodeId)
  scene_delete_nodes:
    description: Delete nodes in the scene store
    parameters:
      ids:
        description: ids (AnyNodeId[])
  scene_create_collection:
    description: Create collection in the scene store
    parameters:
      name:
        description: name (string)
      nodeIds:
        description: nodeIds (AnyNodeId[])
  scene_delete_collection:
    description: Delete collection in the scene store
    parameters:
      id:
        description: id (CollectionId)
  scene_update_collection:
    description: Update collection in the scene store
    parameters:
      id:
        description: id (CollectionId)
      data:
        description: data (Partial<Omit<Collection, 'id'>>)
  scene_add_to_collection:
    description: Add to collection in the scene store
    parameters:
      id:
        description: id (CollectionId)
      nodeId:
        description: nodeId (AnyNodeId)
  scene_remove_from_collection:
    description: Remove from collection in the scene store
    parameters:
      id:
        description: id (CollectionId)
      nodeId:
        description: nodeId (AnyNodeId)
  commandpalette_set_open:
    description: Set open in the commandpalette store
    parameters:
      open:
        description: open (boolean)
  commandpalette_set_mode:
    description: Set mode in the commandpalette store
    parameters:
      mode:
        description: mode (string)
  commandpalette_set_input_value:
    description: Set input value in the commandpalette store
    parameters:
      value:
        description: value (string)
  commandpalette_navigate_to:
    description: Navigate to in the commandpalette store
    parameters:
      page:
        description: page (string)
  commandpalette_go_back:
    description: Go back in the commandpalette store
  commandpalette_set_camera_scope:
    description: Set camera scope in the commandpalette store
    parameters:
      scope:
        description: 'scope ({ nodeId: string; label: string } | null)'
  sidebarstore_set_width:
    description: Set width in the sidebarstore store
    parameters:
      width:
        description: width (number)
  sidebarstore_set_is_dragging:
    description: Set is dragging in the sidebarstore store
    parameters:
      isDragging:
        description: isDragging (boolean)
  audio_set_master_volume:
    description: Set master volume in the audio store
    parameters:
      v:
        description: v (number)
  audio_set_sfx_volume:
    description: Set sfx volume in the audio store
    parameters:
      v:
        description: v (number)
  audio_set_radio_volume:
    description: Set radio volume in the audio store
    parameters:
      v:
        description: v (number)
  audio_set_radio_playing:
    description: Set radio playing in the audio store
    parameters:
      v:
        description: v (boolean)
  audio_toggle_radio_playing:
    description: Toggle radio playing in the audio store
  audio_toggle_mute:
    description: Toggle mute in the audio store
  audio_set_autoplay:
    description: Set autoplay in the audio store
    parameters:
      v:
        description: v (boolean)
  commandregistry_register:
    description: Register in the commandregistry store
    parameters:
      actions:
        description: actions (CommandAction[])
  editor_set_phase:
    description: Set phase in the editor store
    parameters:
      phase:
        description: phase (Phase)
  editor_set_mode:
    description: Set mode in the editor store
    parameters:
      mode:
        description: mode (Mode)
  editor_set_tool:
    description: Set tool in the editor store
